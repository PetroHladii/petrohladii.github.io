<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title></title>

  <link rel="stylesheet" href="../css/style.css" />

  <script src="../config/env-config.js"></script>
  <script src="../config/config.js"></script>
  <script src="../config/access-client.js"></script>
</head>

<body class="page-root">

  <!-- SPLASH -->
  <div id="splash">
    <img src="../new-logo.png" alt="Логотип">
  </div>

  <!-- HEADER -->
  <header class="topbar">

    <h1
      class="logo"
      id="pageHeader">
    </h1>

    <button
      class="logout-btn"
      onclick="Access.logout()">
      Вийти
    </button>

  </header>

  <!-- APP NAVIGATION -->
  <nav class="app-nav">

    <a
      href="index.html"
      class="app-nav-btn active">
      БК
    </a>

    <a
      href="../knowledge/index.html"
      class="app-nav-btn">
      Знання
    </a>

  </nav>

  <!-- CONTENT -->
  <main class="center">

    <!-- Access denied -->
    <section
      id="accessDenied"
      class="panel hidden">

      <h2>
        🔒 Недостатньо прав
      </h2>

      <p>
        У вас недостатньо прав для перегляду цього модуля.
      </p>

      <p>
        Якщо ви вважаєте, що це помилка —
        зверніться до адміністратора.
      </p>

    </section>

    <!-- Module content -->
    <div
      id="moduleContent"
      class="grid-3">

      <a
        class="card big"
        href="rozvidka.html">

        <h2>Mavic/Autel</h2>

      </a>

      <a
        class="card big"
        href="bombers.html">

        <h2>Бомбери</h2>

      </a>

      <a
        class="card big"
        href="fpv.html">

        <h2>FPV</h2>

      </a>

    </div>

  </main>

  <footer class="footer">
    <small>Власність 125 ОВМБр</small>
  </footer>

  <script src="main.js"></script>

  <script>

    document.title =
      CONFIG.indexTitle;

    document
      .getElementById("pageHeader")
      .textContent =
      CONFIG.indexTitle;

    document.addEventListener(
      "DOMContentLoaded",
      () => {

        const splash =
          document.getElementById("splash");

        const alreadyShown =
          localStorage.getItem("splashShown") === "1";

        if (alreadyShown) {

          splash.remove();

          return;

        }

        setTimeout(() => {

          splash.classList.add("hidden");

          setTimeout(() => {

            splash.remove();

          }, 600);

          localStorage.setItem(
            "splashShown",
            "1"
          );

        }, 3000);

      }
    );

  </script>

</body>
</html>
