<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Довідник БК</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    /* SPLASH */
    #splash {
      position: fixed;
      inset: 0;
      background: #000;
      background-image: url("logo.webp");
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      z-index: 9999;
      opacity: 1;
      transition: opacity .6s ease;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* LOGIN */
    #login {
      display: none;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    #login input {
      padding: 10px;
      font-size: 16px;
      width: 260px;
    }

    #login button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body class="page-root">

  <!-- SPLASH -->
  <div id="splash"></div>

  <!-- LOGIN -->
  <div id="login">
    <h2>Вхід</h2>
    <input id="email" placeholder="Email">
    <button onclick="sendCode()">Отримати код</button>

    <input id="code" placeholder="Код">
    <button onclick="verifyCode()">Увійти</button>
  </div>

  <!-- CONTENT -->
  <div id="content" style="display:none;">

    <header class="topbar">
      <h1 class="logo">Довідник БК</h1>
    </header>

    <main class="center">
      <p class="lead">Оберіть категорію:</p>

      <div class="grid-3">
        <a class="card big" href="rozvidka.html">
          <h2>Mavic/Autel</h2>
          <p class="muted">скиди</p>
        </a>

        <a class="card big" href="bombers.html">
          <h2>Бомбери</h2>
          <p class="muted">скиди</p>
        </a>

        <a class="card big" href="fpv.html">
          <h2>FPV</h2>
          <p class="muted">радіо/опта</p>
        </a>
      </div>
    </main>

    <footer class="footer">
      <small>Власність 125 ОВМБр</small>
    </footer>

  </div>

  <script>
    // 🔐 універсальний fetch з токеном
    function authFetch(url, options = {}) {
      const token = localStorage.getItem("token");

      return fetch(url, {
        ...options,
        headers: {
          ...(options.headers || {}),
          ...(token ? { "Authorization": "Bearer " + token } : {})
        }
      });
    }

    function updateUI() {
      const token = localStorage.getItem("token");

      const login = document.getElementById("login");
      const content = document.getElementById("content");

      if (token) {
        login.style.display = "none";
        content.style.display = "block";
      } else {
        login.style.display = "flex";
        content.style.display = "none";
      }
    }

    async function sendCode() {
      const email = document.getElementById("email").value;

      if (!email) {
        alert("Введи email");
        return;
      }

      const res = await authFetch("/api/send-code", {
        method: "POST",
        body: JSON.stringify({ email })
      });

      if (!res.ok) {
        alert("Помилка доступу або email не дозволений");
        return;
      }

      alert("Код відправлено (дивись logs)");
    }

    async function verifyCode() {
      const email = document.getElementById("email").value;
      const code = document.getElementById("code").value;

      if (!email || !code) {
        alert("Введи email і код");
        return;
      }

      const res = await authFetch("/api/verify-code", {
        method: "POST",
        body: JSON.stringify({ email, code })
      });

      const text = await res.text();

      let data;
      try {
        data = JSON.parse(text);
      } catch (e) {
        alert("Помилка сервера");
        return;
      }

      if (!data.token) {
        alert("Невірний код");
        return;
      }

      localStorage.setItem("token", data.token);

      updateUI();
    }

    document.addEventListener("DOMContentLoaded", () => {
      updateUI();

      const splash = document.getElementById("splash");

      const alreadyShown = localStorage.getItem("splashShown") === "1";

      if (alreadyShown) {
        splash.remove();
        return;
      }

      setTimeout(() => {
        splash.classList.add("hidden");

        setTimeout(() => {
          splash.remove();
        }, 600);

        localStorage.setItem("splashShown", "1");
      }, 1500);
    });
  </script>

</body>
</html>
