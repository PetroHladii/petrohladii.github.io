<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Довідник БК</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    /* SPLASH */
    #splash {
      position: fixed;
      inset: 0;
      background: #000;
      background-image: url("logo.webp");
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      z-index: 9999;
      opacity: 1;
      transition: opacity .6s ease;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* LOGIN */
    #login {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      z-index: 1000;
    }

    #login.hidden {
      display: none;
    }

    #login input {
      padding: 10px;
      font-size: 16px;
      width: 260px;
    }

    #login button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body class="page-root">

  <!-- SPLASH -->
  <div id="splash"></div>

  <!-- LOGIN -->
  <div id="login">
    <h2>Вхід</h2>
    <input id="email" placeholder="Email">
    <button onclick="sendCode()">Отримати код</button>

    <input id="code" placeholder="Код">
    <button onclick="verifyCode()">Увійти</button>
  </div>

  <!-- CONTENT -->
  <div id="content">

    <header class="topbar">
      <h1 class="logo">Довідник БК</h1>
    </header>

    <main class="center">
      <p class="lead">Оберіть категорію:</p>

      <div class="grid-3">
        <a class="card big" href="rozvidka.html">
          <h2>Mavic/Autel</h2>
          <p class="muted">скиди</p>
        </a>

        <a class="card big" href="bombers.html">
          <h2>Бомбери</h2>
          <p class="muted">скиди</p>
        </a>

        <a class="card big" href="fpv.html">
          <h2>FPV</h2>
          <p class="muted">радіо/опта</p>
        </a>
      </div>
    </main>

    <footer class="footer">
      <small>Власність 125 ОВМБр</small>
    </footer>

  </div>

  <script>
    async function sendCode() {
      const email = document.getElementById("email").value;

      if (!email) {
        alert("Введи email");
        return;
      }

      const res = await fetch("/api/send-code", {
        method: "POST",
        body: JSON.stringify({ email })
      });

      if (!res.ok) {
        alert("Email не дозволений");
        return;
      }

      alert("Код відправлено (дивись logs)");
    }

    async function verifyCode() {
      const email = document.getElementById("email").value;
      const code = document.getElementById("code").value;

      if (!email || !code) {
        alert("Введи email і код");
        return;
      }

      const res = await fetch("/api/verify-code", {
        method: "POST",
        body: JSON.stringify({ email, code })
      });

      if (!res.ok) {
        alert("Невірний код");
        return;
      }

      // 🔥 cookie встановлено → перезапит сторінки
      window.location.href = "/";
    }

    document.addEventListener("DOMContentLoaded", () => {
      const splash = document.getElementById("splash");

      const alreadyShown = localStorage.getItem("splashShown") === "1";

      if (alreadyShown) {
        splash.remove();
      } else {
        setTimeout(() => {
          splash.classList.add("hidden");

          setTimeout(() => {
            splash.remove();
          }, 600);

          localStorage.setItem("splashShown", "1");
        }, 1500);
      }

      // 🔥 якщо middleware пропустив → значить авторизований
      // просто ховаємо login
      document.getElementById("login").classList.add("hidden");
    });
  </script>

</body>
</html>
